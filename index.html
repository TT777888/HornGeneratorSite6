<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TSUNO | HORN GENERATOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
  :root {
    --bg-white: #ffffff;
    --panel-bg: #f7f7f7;
    --text-black: #000000;
    --border: #e5e5e5;
    --font-ui: 'Helvetica Neue', Arial, sans-serif;
    --font-logo: 'Syne', sans-serif;
    --bone-white: #f9f6f2;
  }
  body { background: var(--bg-white); color: var(--text-black); overflow: hidden; height: 100vh; width: 100vw; font-family: var(--font-ui); }

  .page { position: absolute; inset: 0; display: none; flex-direction: column; opacity: 0; transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
  .page.active { display: flex; opacity: 1; z-index: 10; }

  .typo-logo { font-family: var(--font-logo); font-weight: 800; text-transform: uppercase; line-height: 1.1; }

  #intro-page { background: var(--bg-white); justify-content: center; align-items: center; text-align: center; padding: 0 10px; }
  .intro-logo { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: clamp(20px, 8vw, 32px); margin-bottom: 15px; text-align: center; width: 100%; letter-spacing: 0.05em; }
  @media (min-width: 800px) { .intro-logo { flex-direction: row; gap: 0.3em; font-size: 32px; letter-spacing: 0.1em; white-space: nowrap; } }

  .intro-subtitle { font-size: clamp(10px, 3vw, 13px); color: #888; letter-spacing: 0.25em; margin-bottom: 45px; }
  .btn-ui-main { padding: 18px 50px; background: var(--text-black); border: none; color: #fff; cursor: pointer; font-family: var(--font-ui); font-size: 11px; letter-spacing: 0.2em; font-weight: 700; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease; border-radius: 0; text-transform: uppercase; display: inline-block; }
  @media (hover: hover) { .btn-ui-main:hover { transform: scale(1.06); opacity: 0.9; } }

  #main-page { display: flex; flex-direction: column; }
  #viewer-container { flex: 1; background: #fff; position: relative; }
  .header-logo { position: absolute; top: 20px; left: 20px; z-index: 200; font-size: clamp(10px, 2.5vw, 14px); white-space: nowrap; font-family: var(--font-logo); font-weight: 800; text-transform: uppercase; }
  .download-area { position: absolute; top: 15px; right: 15px; z-index: 200; }
  .btn-dl-minimal { width: 46px; height: 46px; background: #fff; border: 1px solid #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
  .btn-dl-minimal svg { width: 20px; height: 20px; fill: none; stroke: var(--text-black); stroke-width: 1.3; }

  #step-panel { height: 260px; background: var(--panel-bg); border-top: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 10px; z-index: 100; position: relative; }
  .step-nav { display: flex; align-items: center; justify-content: center; gap: clamp(10px, 4vw, 20px); width: 100%; max-width: 900px; }
  .nav-arrow { width: 44px; height: 44px; border-radius: 50%; border: 1px solid #ddd; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; font-size: 16px; color: var(--text-black); flex-shrink: 0; }
  .nav-arrow.disabled { opacity: 0.1; cursor: default; }

  #steps-container { width: 100%; max-width: 340px; min-height: 150px; display: flex; align-items: flex-start; justify-content: center; }
  .step-content { text-align: center; display: none; width: 100%; }
  .step-content.active { display: block; animation: slideUp 0.4s ease forwards; }

  .step-counter { font-size: 8px; color: #aaa; letter-spacing: 0.3em; margin-bottom: 6px; font-weight: 700; }
  .step-name { font-family: var(--font-logo); font-size: clamp(20px, 6vw, 24px); font-weight: 800; margin-bottom: 20px; letter-spacing: -0.01em; }

  .slider-wrapper { position: relative; padding: 0 5px; width: 100%; height: 60px; display: flex; flex-direction: column; justify-content: center; }
  input[type=range] { -webkit-appearance: none; width: 100%; height: 2px; background: #ddd; outline: none; margin: 10px 0; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: #000; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }
  .range-guides { display: flex; justify-content: space-between; margin-top: 0px; font-size: 9px; color: #ccc; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; height: 12px; line-height: 1; }

  /* ── UPDATED TEXTURE PREVIEW DOTS ── */
  .color-grid { display: flex; gap: clamp(10px, 4vw, 20px); justify-content: center; align-items: center; height: 44px; margin: 4px 0; }
  .color-dot { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); position: relative; overflow: hidden; background-size: cover; transition: transform 0.2s; }
  .color-dot.active { box-shadow: 0 0 0 3px #fff, 0 0 0 5px #000; transform: scale(1.1); }
  
  /* プレビューアイコンをリアルなイメージに修正 */
  .p-bone { background: radial-gradient(circle at 30% 30%, #fff, var(--bone-white)); }
  .p-cow { 
    background-color: var(--bone-white);
    background-image: 
      radial-gradient(circle at 20% 30%, #333 15%, transparent 25%),
      radial-gradient(circle at 70% 60%, #222 20%, transparent 35%),
      radial-gradient(circle at 40% 80%, #444 10%, transparent 20%);
  }
  .p-deer { 
    background: linear-gradient(135deg, #a67c52 0%, #8b5a2b 50%, var(--bone-white) 100%);
  }
  .p-dark { 
    background: radial-gradient(circle at 30% 30%, #444, #111);
  }

  .color-picker-wrapper { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #ddd; cursor: pointer; background: conic-gradient(red, yellow, lime, aqua, blue, fuchsia, red); position: relative; overflow: hidden; }
  #custom-color { position: absolute; opacity: 0; inset: 0; width: 100%; height: 100%; cursor: pointer; }

  .finish-area { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: auto; }
  .btn-regen-mobile { padding: 10px 22px; font-size: 9px; white-space: nowrap; }

  @media (min-width: 800px) {
    #steps-container { max-width: 400px; margin-top: 15px; }
    .step-counter { font-size: 10px; margin-bottom: 8px; }
    .step-name { font-size: 32px; margin-bottom: 25px; } 
    .range-guides { font-size: 11px; } 
    .step-nav { gap: 80px; } 
    .nav-arrow { width: 54px; height: 54px; font-size: 18px; }
    #step-panel { padding-top: 22px; height: 280px; } 
    .finish-area { position: absolute; bottom: 35px; right: 40px; left: auto; transform: none; }
    .btn-regen-mobile { padding: 14px 44px; font-size: 10px; }
    .header-logo { top: 25px; left: 30px; }
    .download-area { top: 25px; right: 40px; }
  }
</style>
</head>
<body>

<div id="intro-page" class="page active">
  <div class="intro-logo typo-logo"><span>HORN</span><span>GENERATOR</span></div>
  <div class="intro-subtitle">Produced By Shachihata Inc.</div>
  <button class="btn-ui-main" onclick="startApp()">START GENERATING</button>
</div>

<div id="main-page" class="page">
  <div id="viewer-container">
    <div class="header-logo typo-logo">HORN GENERATOR</div>
    <div class="download-area">
      <button class="btn-dl-minimal" onclick="downloadModel()" title="Download .obj"><svg viewBox="0 0 24 24"><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"></path><polyline points="7 11 12 16 17 11"></polyline><line x1="12" y1="16" x2="12" y2="4"></line></svg></button>
    </div>
    <div id="three-canvas" style="width:100%; height:100%;"></div>
  </div>

  <div id="step-panel">
    <div class="step-nav">
      <button class="nav-arrow disabled" id="prev-btn" onclick="changeStep(-1)">←</button>
      <div id="steps-container">
        <div class="step-content active"><p class="step-counter">STEP 01 / 05</p><p class="step-name">SIZE</p><div class="slider-wrapper"><input id="i-size" type="range" min="1" max="5" value="3"><div class="range-guides"><span>Short</span><span>Long</span></div></div></div>
        <div class="step-content"><p class="step-counter">STEP 02 / 05</p><p class="step-name">CURVE</p><div class="slider-wrapper"><input id="i-bend" type="range" min="1" max="5" value="3"><div class="range-guides"><span>Straight</span><span>Curved</span></div></div></div>
        <div class="step-content"><p class="step-counter">STEP 03 / 05</p><p class="step-name">BUMP</p><div class="slider-wrapper"><input id="i-bump" type="range" min="1" max="5" value="3"><div class="range-guides"><span>Smooth</span><span>Rough</span></div></div></div>
        <div class="step-content"><p class="step-counter">STEP 04 / 05</p><p class="step-name">BRANCHES</p><div class="slider-wrapper"><input id="i-branch" type="range" min="0" max="2" value="0"><div class="range-guides"><span>0</span><span>2</span></div></div></div>
        <div class="step-content"><p class="step-counter">STEP 05 / 05</p><p class="step-name">TEXTURE</p>
          <div class="slider-wrapper">
            <div class="color-grid" id="palette">
              <div class="color-dot active p-bone" data-pattern="bone"></div>
              <div class="color-dot p-cow" data-pattern="cow"></div>
              <div class="color-dot p-deer" data-pattern="deer"></div>
              <div class="color-dot p-dark" data-pattern="dark"></div>
              <div class="color-picker-wrapper"><input type="color" id="custom-color" value="#f9f6f2"></div>
            </div>
            <div class="range-guides" style="visibility: hidden;"><span>-</span><span>-</span></div>
          </div>
        </div>
      </div>
      <button class="nav-arrow" id="next-btn" onclick="changeStep(1)">→</button>
    </div>
    <div class="finish-area"><button class="btn-ui-main btn-regen-mobile" onclick="newDNA()">REGENERATE</button></div>
  </div>
</div>

<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { OBJExporter } from "three/addons/exporters/OBJExporter.js";

let settings = { size: 3, bend: 3, bump: 3, branch: 0, color: "#f9f6f2", pattern: "bone" };
let dna;
function initDNA() {
  dna = {
    seed: Math.random() * 100,
    noiseBase: Array.from({ length: 300 }, () => Math.random()),
    branchDNA: Array.from({ length: 3 }, () => ({
      t: 0.3 + Math.random() * 0.2,
      angle: (Math.random() * 2 - 1) * Math.PI * 0.08, 
      lenMult: 0.35 + Math.random() * 0.25,
      curveMult: 0.6 + Math.random() * 0.9,
      bendSeedX: Math.random()*10,
      bendSeedZ: Math.random()*10
    }))
  };
  dna.branchDNA.sort((a, b) => a.t - b.t);
}
initDNA();

let scene, camera, renderer, controls, hornGroup, currentStep = 0;

window.startApp = () => {
  document.getElementById('intro-page').classList.remove('active');
  document.getElementById('main-page').classList.add('active');
  initThree();
};

window.changeStep = (dir) => {
  const steps = document.querySelectorAll('.step-content');
  steps[currentStep].classList.remove('active');
  currentStep = Math.max(0, Math.min(steps.length - 1, currentStep + dir));
  steps[currentStep].classList.add('active');
  document.getElementById('prev-btn').classList.toggle('disabled', currentStep === 0);
  document.getElementById('next-btn').classList.toggle('disabled', currentStep === steps.length - 1);
};

window.newDNA = () => { initDNA(); updateModel(); };
window.downloadModel = () => {
  const exporter = new OBJExporter();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([exporter.parse(hornGroup)], { type: 'text/plain' }));
  a.download = 'tsuno_model.obj'; a.click();
};

function initThree() {
  const c = document.getElementById("viewer-container");
  scene = new THREE.Scene(); scene.background = new THREE.Color(0xffffff);
  camera = new THREE.PerspectiveCamera(40, c.clientWidth/c.clientHeight, 0.1, 1000);
  camera.position.set(0, 5, 22);
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(c.clientWidth, c.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.getElementById("three-canvas").appendChild(renderer.domElement);
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const l = new THREE.DirectionalLight(0xffffff, 1.2); l.position.set(10,20,10); scene.add(l);
  hornGroup = new THREE.Group(); scene.add(hornGroup);
  animate(); updateModel();
}

function getNaturalMaterial() {
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(settings.color),
    roughness: 0.8,
    metalness: 0.05
  });

  mat.onBeforeCompile = (shader) => {
    shader.uniforms.uPattern = { value: ["bone", "cow", "deer", "dark"].indexOf(settings.pattern) };
    shader.uniforms.uSeed = { value: dna.seed };
    shader.uniforms.uBaseColor = { value: new THREE.Color(settings.color) };
    
    shader.vertexShader = `
      varying vec3 vWorldPos;
      varying float vT;
      ${shader.vertexShader}
    `.replace('#include <begin_vertex>', `
      #include <begin_vertex>
      vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
      vT = uv.y;
    `);

    shader.fragmentShader = `
      varying vec3 vWorldPos;
      varying float vT;
      uniform int uPattern;
      uniform float uSeed;
      uniform vec3 uBaseColor;

      float hash(vec3 p) {
        p = fract(p * 0.3183099 + .1);
        p *= 17.0;
        return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
      }

      float noise(vec3 x) {
        vec3 i = floor(x); vec3 f = fract(x);
        f = f*f*(3.0-2.0*f);
        return mix(mix(mix(hash(i+vec3(0,0,0)), hash(i+vec3(1,0,0)),f.x),
                   mix(hash(i+vec3(0,1,0)), hash(i+vec3(1,1,0)),f.x),f.y),
               mix(mix(hash(i+vec3(0,0,1)), hash(i+vec3(1,0,1)),f.x),
                   mix(hash(i+vec3(0,1,1)), hash(i+vec3(1,1,1)),f.x),f.y),f.z);
      }

      ${shader.fragmentShader}
    `.replace('#include <color_fragment>', `
      #include <color_fragment>
      vec3 boneBase = vec3(0.97, 0.96, 0.94);
      vec3 brownBase = vec3(0.85, 0.78, 0.70);
      float baseNoise = noise(vWorldPos * 0.5 + uSeed);
      vec3 naturalBase = mix(boneBase, brownBase, baseNoise);
      naturalBase = mix(naturalBase, uBaseColor, 0.3);

      vec3 finalCol = naturalBase;

      if(uPattern == 1) { // Cow
        float n = noise(vWorldPos * 0.6 + uSeed * 1.2);
        float spots = smoothstep(0.46, 0.54, n);
        vec3 spotColor = mix(vec3(0.3, 0.2, 0.1), vec3(0.05), smoothstep(0.48, 0.5, n));
        finalCol = mix(spotColor, naturalBase, spots);
      } 
      else if(uPattern == 2) { // Deer
        vec3 deerBrown = vec3(0.4, 0.25, 0.15);
        vec3 deerBase = mix(deerBrown, naturalBase, vT * 1.2);
        float n = noise(vWorldPos * 2.0 + uSeed);
        finalCol = mix(deerBase * 0.8, deerBase, n);
      }
      else if(uPattern == 3) { // Dark
        vec3 darkCore = vec3(0.08, 0.06, 0.05);
        vec3 darkTip = vec3(0.3, 0.28, 0.25);
        finalCol = mix(darkCore, darkTip, vT);
        finalCol *= (0.8 + 0.4 * noise(vWorldPos * 1.5));
      }
      diffuseColor.rgb = finalCol;
    `);
  };
  return mat;
}

function createGrowingHorn(isBranch = false, startPos = new THREE.Vector3(), startDir = new THREE.Vector3(0,1,0), scale = 1.0, branchRadius = 0, bDNA = null) {
  const points = [], segments = 120, radSegs = 32;
  const growthLen = settings.size * 2.2 * scale;
  const bendStr = settings.bend * 0.6;
  const sX = isBranch ? bDNA.bendSeedX : (dna.seed + 1), sZ = isBranch ? bDNA.bendSeedZ : (dna.seed + 2);
  const curveMult = isBranch ? bDNA.curveMult : 1.0;

  for (let i = 0; i <= 20; i++) {
    const t = i / 20, gTime = t * growthLen;
    const p = new THREE.Vector3(0, gTime, 0);
    const xOff = Math.sin(gTime * 0.4 * curveMult + sX) * bendStr * 0.15 * Math.pow(t, 1.2) * 5.0;
    const zOff = Math.cos(gTime * 0.4 * curveMult + sZ) * bendStr * 0.15 * Math.pow(t, 1.2) * 5.0;
    if (isBranch) {
      const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), startDir.clone().normalize());
      p.applyQuaternion(q).add(new THREE.Vector3(xOff, 0, zOff).applyQuaternion(q));
    } else { p.x += xOff; p.z += zOff; }
    points.push(p.add(startPos));
  }
  const curve = new THREE.CatmullRomCurve3(points);
  const pRadius = 0.6 * (settings.size * 0.08 + 0.9);
  const vertices = [], indices = [], uvs = [], frames = curve.computeFrenetFrames(segments, false);

  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const bump = 1 + (dna.noiseBase[Math.floor(t*299)] - 0.5) * (settings.bump * 0.02) * (1.1 - t);
    const r = Math.max(0.01, (isBranch ? branchRadius : pRadius) * Math.pow(1.0 - t, 0.9) * bump);
    const p = curve.getPointAt(t), n = frames.normals[i], b = frames.binormals[i];
    for (let j = 0; j <= radSegs; j++) {
      const a = (j / radSegs) * Math.PI * 2;
      const v = new THREE.Vector3().copy(p).add(n.clone().multiplyScalar(Math.cos(a)*r)).add(b.clone().multiplyScalar(Math.sin(a)*r));
      vertices.push(v.x, v.y, v.z);
      uvs.push(j/radSegs, t);
    }
  }
  for (let i = 0; i < (vertices.length/3/(radSegs+1)-1); i++) {
    for (let j = 0; j < radSegs; j++) {
      const a = i*(radSegs+1)+j, b = (i+1)*(radSegs+1)+j, c = (i+1)*(radSegs+1)+(j+1), d = i*(radSegs+1)+(j+1);
      indices.push(a, b, d, b, c, d);
    }
  }
  if (!isBranch) {
    const bc = vertices.length/3; vertices.push(points[0].x, points[0].y, points[0].z); uvs.push(0.5,0);
    for (let j = 0; j < radSegs; j++) indices.push(bc, j, j + 1);
  }
  const tc = vertices.length/3; const tp = curve.getPointAt(1); vertices.push(tp.x, tp.y, tp.z); uvs.push(0.5,1);
  const lr = (Math.floor(vertices.length/3/(radSegs+1))-2)*(radSegs+1);
  for (let j = 0; j < radSegs; j++) indices.push(tc, lr+j+1, lr+j);

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(indices); geo.computeVertexNormals();
  return { mesh: new THREE.Mesh(geo, getNaturalMaterial()), curve: curve, frames: frames };
}

function updateModel() {
  if(!hornGroup) return;
  while(hornGroup.children.length > 0) {
    const c = hornGroup.children[0]; c.geometry.dispose(); c.material.dispose(); hornGroup.remove(c);
  }
  const main = createGrowingHorn(); hornGroup.add(main.mesh);
  if (settings.branch > 0) {
    for (let i = 0; i < Math.min(settings.branch, dna.branchDNA.length); i++) {
      const bd = dna.branchDNA[i], t = bd.t, bPos = main.curve.getPointAt(t), bTan = main.curve.getTangentAt(t);
      const swellR = 0.6 * (settings.size * 0.08 + 0.9) * Math.pow(1.0-t,0.9) * (1.2 + 0.5 * Math.exp(-Math.pow((t-0.45)/0.1,2)));
      const inNorm = main.frames.normals[Math.floor(t*(main.frames.normals.length-1))].clone();
      const bDir = bTan.clone().lerp(inNorm, Math.tan((25+Math.random()*15)*(Math.PI/180))).normalize().applyAxisAngle(inNorm, bd.angle);
      hornGroup.add(createGrowingHorn(true, bPos, bDir, bd.lenMult, swellR, bd).mesh);
    }
  }
  const box = new THREE.Box3().setFromObject(hornGroup);
  const center = new THREE.Vector3(); box.getCenter(center);
  hornGroup.children.forEach(m => m.position.sub(center));
}

function animate() { requestAnimationFrame(animate); if (controls) controls.update(); renderer.render(scene, camera); }

['size', 'bend', 'bump', 'branch'].forEach(id => {
  document.getElementById('i-' + id).oninput = (e) => { settings[id] = parseInt(e.target.value); updateModel(); };
});

document.getElementById('palette').onclick = (e) => {
  if (e.target.classList.contains('color-dot')) {
    document.querySelector('.color-dot.active')?.classList.remove('active');
    e.target.classList.add('active');
    settings.pattern = e.target.dataset.pattern;
    updateModel();
  }
};

document.getElementById('custom-color').oninput = (e) => {
  document.querySelector('.color-dot.active')?.classList.remove('active');
  settings.pattern = 'bone'; settings.color = e.target.value; updateModel();
};

window.onresize = () => {
  const c = document.getElementById("viewer-container");
  camera.aspect = c.clientWidth/c.clientHeight; camera.updateProjectionMatrix();
  renderer.setSize(c.clientWidth, c.clientHeight);
};
</script>
</body>
</html>
