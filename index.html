<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TSUNO | HORN GENERATOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
  :root {
    --bg-white: #ffffff;
    --panel-bg: #f7f7f7;
    --text-black: #000000;
    --border: #e5e5e5;
    --font-ui: 'Helvetica Neue', Arial, sans-serif;
    --font-logo: 'Syne', sans-serif;
  }
  body { 
    background: var(--bg-white); 
    color: var(--text-black); 
    overflow: hidden; 
    height: 100vh;
    width: 100vw;
    font-family: var(--font-ui);
  }

  .page {
    position: absolute; inset: 0;
    display: none; flex-direction: column;
    opacity: 0; transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .page.active { display: flex; opacity: 1; z-index: 10; }

  /* ── TYPOGRAPHY ── */
  .typo-logo {
    font-family: var(--font-logo);
    font-weight: 800; text-transform: uppercase;
    line-height: 1.1;
  }

  /* ── START SCREEN ── */
  #intro-page {
    background: var(--bg-white);
    justify-content: center; align-items: center;
    text-align: center;
    padding: 0 10px;
  }
  
  .intro-logo { 
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: clamp(20px, 8vw, 32px); 
    margin-bottom: 15px; 
    text-align: center;
    width: 100%;
    letter-spacing: 0.05em;
  }
  
  @media (min-width: 800px) {
    .intro-logo { 
      flex-direction: row; 
      gap: 0.3em;
      font-size: 32px; 
      letter-spacing: 0.1em;
      white-space: nowrap;
    }
  }

  .intro-subtitle {
    font-size: clamp(10px, 3vw, 13px); color: #888; letter-spacing: 0.25em;
    margin-bottom: 45px;
  }
  
  .btn-ui-main {
    padding: 18px 50px;
    background: var(--text-black); border: none;
    color: #fff; cursor: pointer; 
    font-family: var(--font-ui);
    font-size: 11px; letter-spacing: 0.2em;
    font-weight: 700;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
    border-radius: 0; 
    text-transform: uppercase;
    display: inline-block;
  }
  @media (hover: hover) { .btn-ui-main:hover { transform: scale(1.06); opacity: 0.9; } }

  /* ── MAIN CUSTOMIZER ── */
  #main-page { display: flex; flex-direction: column; }
  #viewer-container { flex: 1; background: #fff; position: relative; }

  .header-logo {
    position: absolute; top: 20px; left: 20px; z-index: 200;
    font-size: clamp(10px, 2.5vw, 14px);
    white-space: nowrap;
    font-family: var(--font-logo); font-weight: 800; text-transform: uppercase;
  }

  .download-area {
    position: absolute; top: 15px; right: 15px; z-index: 200;
  }
  .btn-dl-minimal {
    width: 46px; height: 46px; background: #fff; 
    border: 1px solid #ddd; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: 0.3s;
  }
  .btn-dl-minimal svg { width: 20px; height: 20px; fill: none; stroke: var(--text-black); stroke-width: 1.3; }

  /* STEP PANEL */
  #step-panel {
    height: 260px; background: var(--panel-bg);
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 10px;
    z-index: 100;
    position: relative;
  }

  .step-nav {
    display: flex; align-items: center; justify-content: center;
    gap: clamp(10px, 4vw, 20px);
    width: 100%; max-width: 900px; 
  }
  .nav-arrow {
    width: 44px; height: 44px; border-radius: 50%; border: 1px solid #ddd;
    background: #fff; cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: 0.2s; font-size: 16px;
    color: var(--text-black); flex-shrink: 0;
  }
  .nav-arrow.disabled { opacity: 0.1; cursor: default; }

  #steps-container { 
    width: 100%; 
    max-width: 340px; 
    min-height: 150px; 
    display: flex; align-items: flex-start; justify-content: center; 
  }
  .step-content { text-align: center; display: none; width: 100%; }
  .step-content.active { display: block; animation: slideUp 0.4s ease forwards; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .step-counter { font-size: 8px; color: #aaa; letter-spacing: 0.3em; margin-bottom: 6px; font-weight: 700; }
  .step-name { font-family: var(--font-logo); font-size: clamp(20px, 6vw, 24px); font-weight: 800; margin-bottom: 20px; letter-spacing: -0.01em; }

  .slider-wrapper { 
    position: relative; 
    padding: 0 5px; 
    width: 100%; 
    height: 60px; 
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  
  input[type=range] { -webkit-appearance: none; width: 100%; height: 2px; background: #ddd; outline: none; margin: 10px 0; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: #000; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }

  .range-guides {
    display: flex; justify-content: space-between;
    margin-top: 0px; font-size: 9px; color: #ccc;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
    height: 12px;
    line-height: 1;
  }

  .color-grid { 
    display: flex; gap: clamp(8px, 3vw, 15px); 
    justify-content: center; align-items: center; 
    height: 34px;
    margin: 4px 0; 
  }
  .color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); position: relative; }
  .color-dot.active { box-shadow: 0 0 0 3px #fff, 0 0 0 5px #000; }
  .color-picker-wrapper { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ddd; cursor: pointer; background: conic-gradient(red, yellow, lime, aqua, blue, fuchsia, red); position: relative; overflow: hidden; }
  #custom-color { position: absolute; opacity: 0; inset: 0; width: 100%; height: 100%; cursor: pointer; }

  .finish-area { 
    position: fixed;
    bottom: 30px; 
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    width: auto;
  }
  .btn-regen-mobile {
    padding: 10px 22px;
    font-size: 9px;
    white-space: nowrap;
  }

  @media (min-width: 800px) {
    #steps-container { 
      max-width: 400px; 
      margin-top: 15px; 
    }
    .step-counter { font-size: 10px; margin-bottom: 8px; }
    .step-name { font-size: 32px; margin-bottom: 25px; } 
    .range-guides { font-size: 11px; } 
    
    .step-nav { gap: 80px; } 
    .nav-arrow { width: 54px; height: 54px; font-size: 18px; }
    #step-panel { padding-top: 25px; height: 300px; } 
    
    .finish-area { 
      position: absolute; 
      bottom: 35px; 
      right: 40px; 
      left: auto; 
      transform: none; 
    }
    .btn-regen-mobile { padding: 14px 44px; font-size: 10px; }
    .header-logo { top: 25px; left: 30px; }
    .download-area { top: 25px; right: 40px; }
  }
</style>
</head>
<body>

<div id="intro-page" class="page active">
  <div class="intro-logo typo-logo">
    <span>HORN</span>
    <span>GENERATOR</span>
  </div>
  <div class="intro-subtitle">Produced By Shachihata Inc.</div>
  <button class="btn-ui-main" onclick="startApp()">START GENERATING</button>
</div>

<div id="main-page" class="page">
  <div id="viewer-container">
    <div class="header-logo typo-logo">HORN GENERATOR</div>
    <div class="download-area">
      <button class="btn-dl-minimal" onclick="downloadModel()" title="Download .obj">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"></path>
          <polyline points="7 11 12 16 17 11"></polyline>
          <line x1="12" y1="16" x2="12" y2="4"></line>
        </svg>
      </button>
    </div>
    <div id="three-canvas" style="width:100%; height:100%;"></div>
  </div>

  <div id="step-panel">
    <div class="step-nav">
      <button class="nav-arrow disabled" id="prev-btn" onclick="changeStep(-1)">←</button>
      <div id="steps-container">
        <div class="step-content active">
          <p class="step-counter">STEP 01 / 05</p>
          <p class="step-name">SIZE</p>
          <div class="slider-wrapper">
            <input id="i-size" type="range" min="1" max="5" value="3">
            <div class="range-guides"><span>Short</span><span>Long</span></div>
          </div>
        </div>
        <div class="step-content">
          <p class="step-counter">STEP 02 / 05</p>
          <p class="step-name">CURVE</p>
          <div class="slider-wrapper">
            <input id="i-bend" type="range" min="1" max="5" value="3">
            <div class="range-guides"><span>Straight</span><span>Curved</span></div>
          </div>
        </div>
        <div class="step-content">
          <p class="step-counter">STEP 03 / 05</p>
          <p class="step-name">BUMP</p>
          <div class="slider-wrapper">
            <input id="i-bump" type="range" min="1" max="5" value="3">
            <div class="range-guides"><span>Smooth</span><span>Rough</span></div>
          </div>
        </div>
        <div class="step-content">
          <p class="step-counter">STEP 04 / 05</p>
          <p class="step-name">BRANCHES</p>
          <div class="slider-wrapper">
            <input id="i-branch" type="range" min="1" max="5" value="1">
            <div class="range-guides"><span>0</span><span>5</span></div>
          </div>
        </div>
        <div class="step-content">
          <p class="step-counter">STEP 05 / 05</p>
          <p class="step-name">COLOR</p>
          <div class="slider-wrapper">
            <div class="color-grid" id="palette">
              <div class="color-dot active" style="background:#ffffff;" data-color="#ffffff"></div>
              <div class="color-dot" style="background:#f2f2f2;" data-color="#f2f2f2"></div>
              <div class="color-dot" style="background:#d4a373;" data-color="#d4a373"></div>
              <div class="color-dot" style="background:#4e4449;" data-color="#4e4449"></div>
              <div class="color-picker-wrapper"><input type="color" id="custom-color" value="#ffffff"></div>
            </div>
            <div class="range-guides" style="visibility: hidden;"><span>-</span><span>-</span></div>
          </div>
        </div>
      </div>
      <button class="nav-arrow" id="next-btn" onclick="changeStep(1)">→</button>
    </div>
    <div class="finish-area">
      <button class="btn-ui-main btn-regen-mobile" onclick="newDNA()">REGENERATE</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { OBJExporter } from "three/addons/exporters/OBJExporter.js";

let settings = {
  size: 3,
  bend: 3,
  bump: 3,
  branch: 1,
  color: "#ffffff"
};

let dna;
let currentStep = 0;
let scene, camera, renderer, controls, hornGroup;

function initDNA() {
  dna = {
    twist: Math.random() * Math.PI * 2,
    wobble: Math.random() * 10,
    branchDNA: Array.from({ length: 5 }, (_, i) => ({
      offset: (Math.random() - 0.5) * 0.035,
      length: 0.9 + Math.random() * 0.35,
      lift: 0.85 + Math.random() * 0.4,
      side: i % 2 === 0 ? 1 : -1
    }))
  };
}

initDNA();

window.startApp = () => {
  document.getElementById("intro-page").classList.remove("active");
  document.getElementById("main-page").classList.add("active");
  initThree();
};

window.changeStep = (dir) => {
  const steps = document.querySelectorAll(".step-content");
  steps[currentStep].classList.remove("active");

  currentStep = Math.max(0, Math.min(steps.length - 1, currentStep + dir));

  steps[currentStep].classList.add("active");
  document.getElementById("prev-btn").classList.toggle("disabled", currentStep === 0);
  document.getElementById("next-btn").classList.toggle("disabled", currentStep === steps.length - 1);
};

window.newDNA = () => {
  initDNA();
  updateModel();
};

window.downloadModel = () => {
  const exporter = new OBJExporter();
  const result = exporter.parse(hornGroup);
  const blob = new Blob([result], { type: "text/plain" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "tsuno_model.obj";
  a.click();
};

function initThree() {
  const container = document.getElementById("viewer-container");

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff);

  camera = new THREE.PerspectiveCamera(
    40,
    container.clientWidth / container.clientHeight,
    0.1,
    1000
  );
  camera.position.set(0, 4.5, 24);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const canvasWrap = document.getElementById("three-canvas");
  canvasWrap.innerHTML = "";
  canvasWrap.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.enablePan = false;
  controls.target.set(0, 0, 0);

  scene.add(new THREE.AmbientLight(0xffffff, 1.15));

  const key = new THREE.DirectionalLight(0xffffff, 1.7);
  key.position.set(10, 18, 12);
  scene.add(key);

  const fill = new THREE.DirectionalLight(0xdde8ff, 0.7);
  fill.position.set(-10, 8, -10);
  scene.add(fill);

  const rim = new THREE.DirectionalLight(0xfff1e6, 0.6);
  rim.position.set(0, 10, -16);
  scene.add(rim);

  hornGroup = new THREE.Group();
  scene.add(hornGroup);

  updateModel();
  animate();
}

function antlerMaterial() {
  return new THREE.MeshPhysicalMaterial({
    color: settings.color,
    roughness: 0.68,
    metalness: 0.0,
    clearcoat: 0.12,
    clearcoatRoughness: 0.55,
    side: THREE.DoubleSide
  });
}

function mainCurve() {
  const size = 4.8 + settings.size * 1.55;
  const bend = 1.0 + settings.bend * 0.58;

  return new THREE.CatmullRomCurve3([
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(-bend * 0.75, size * 0.16, 0.05),
    new THREE.Vector3(-bend * 1.85, size * 0.38, 0.35),
    new THREE.Vector3(-bend * 1.65, size * 0.58, 0.22),
    new THREE.Vector3(-bend * 0.35, size * 0.78, 0.02),
    new THREE.Vector3(bend * 1.28, size * 0.98, -0.08)
  ], false, "catmullrom", 0.45);
}

function radiusProfile(baseRadius, t, bumpPower) {
  const taper = Math.pow(1 - t, 1.42);
  const roundedTip = 0.035;

  const ring =
    Math.sin(t * Math.PI * 34) * bumpPower * 0.075 +
    Math.sin(t * Math.PI * 91 + dna.wobble) * bumpPower * 0.025;

  return Math.max(baseRadius * taper * (1 + ring), roundedTip);
}

function createTaperedMesh(curve, baseRadius, bumpPower, radialSegments = 34, heightSegments = 150) {
  const frames = curve.computeFrenetFrames(heightSegments, false);

  const vertices = [];
  const normals = [];
  const uvs = [];
  const indices = [];

  for (let i = 0; i <= heightSegments; i++) {
    const t = i / heightSegments;
    const center = curve.getPointAt(t);
    const normal = frames.normals[i];
    const binormal = frames.binormals[i];

    const radius = radiusProfile(baseRadius, t, bumpPower);

    for (let j = 0; j <= radialSegments; j++) {
      const v = j / radialSegments;
      const angle = v * Math.PI * 2;

      const ovalX = Math.cos(angle) * radius * 1.04;
      const ovalY = Math.sin(angle) * radius * 0.96;

      const p = new THREE.Vector3()
        .copy(center)
        .addScaledVector(normal, ovalX)
        .addScaledVector(binormal, ovalY);

      vertices.push(p.x, p.y, p.z);

      const n = new THREE.Vector3()
        .addScaledVector(normal, ovalX)
        .addScaledVector(binormal, ovalY)
        .normalize();

      normals.push(n.x, n.y, n.z);
      uvs.push(v, t);
    }
  }

  for (let i = 0; i < heightSegments; i++) {
    for (let j = 0; j < radialSegments; j++) {
      const a = i * (radialSegments + 1) + j;
      const b = a + radialSegments + 1;
      const c = b + 1;
      const d = a + 1;

      indices.push(a, b, d);
      indices.push(b, c, d);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.Float32BufferAttribute(vertices, 3));
  geo.setAttribute("normal", new THREE.Float32BufferAttribute(normals, 3));
  geo.setAttribute("uv", new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  return new THREE.Mesh(geo, antlerMaterial());
}

function curveFrame(curve, t) {
  const point = curve.getPointAt(t);
  const tangent = curve.getTangentAt(t).normalize();

  let outward = new THREE.Vector3().crossVectors(tangent, new THREE.Vector3(0, 0, 1));
  if (outward.length() < 0.001) outward.set(1, 0, 0);
  outward.normalize();

  return { point, tangent, outward };
}

function branchCurveFromMain(curve, index, total) {
  const basePositions = [0.22, 0.42, 0.60, 0.75, 0.86];
  const bd = dna.branchDNA[index];

  const t = Math.min(0.92, Math.max(0.12, basePositions[index] + bd.offset));
  const { point, tangent, outward } = curveFrame(curve, t);

  const size = 4.8 + settings.size * 1.55;
  const side = bd.side;
  const length = size * (0.28 + index * 0.04) * bd.length;
  const up = new THREE.Vector3(0, 1, 0);

  const dir = new THREE.Vector3()
    .addScaledVector(tangent, 0.20)
    .addScaledVector(outward, side * (0.82 + index * 0.08))
    .addScaledVector(up, bd.lift)
    .normalize();

  const p0 = point.clone().addScaledVector(outward, side * -0.10);
  const p1 = point.clone().addScaledVector(dir, length * 0.24);
  const p2 = point.clone().addScaledVector(dir, length * 0.62);
  const p3 = point.clone().addScaledVector(dir, length);

  p1.y += length * 0.02;
  p2.y += length * 0.10;
  p3.y += length * 0.22;

  p2.addScaledVector(outward, side * length * 0.06);
  p3.addScaledVector(outward, side * length * 0.10);

  return {
    curve: new THREE.CatmullRomCurve3([p0, p1, p2, p3], false, "catmullrom", 0.45),
    root: point
  };
}

function createJointBulge(position, radius) {
  const geo = new THREE.SphereGeometry(radius, 32, 18);
  const mesh = new THREE.Mesh(geo, antlerMaterial());

  mesh.position.copy(position);
  mesh.scale.set(1.45, 0.86, 1.05);

  return mesh;
}

function createBaseRing(position, radius) {
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(radius * 0.82, radius * 0.08, 12, 48),
    antlerMaterial()
  );

  ring.rotation.x = Math.PI / 2;
  ring.position.copy(position);

  return ring;
}

function disposeObject(obj) {
  obj.traverse?.((child) => {
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      if (Array.isArray(child.material)) {
        child.material.forEach((m) => m.dispose());
      } else {
        child.material.dispose();
      }
    }
  });
}

function updateModel() {
  if (!hornGroup) return;

  while (hornGroup.children.length > 0) {
    const child = hornGroup.children[0];
    hornGroup.remove(child);
    disposeObject(child);
  }

  const curve = mainCurve();

  const bumpPower = settings.bump / 5;
  const mainRadius = 0.42 + settings.size * 0.065;

  const mainMesh = createTaperedMesh(
    curve,
    mainRadius,
    bumpPower,
    38,
    170
  );
  hornGroup.add(mainMesh);

  const branchCount = Math.max(0, settings.branch - 1);

  for (let i = 0; i < branchCount; i++) {
    const data = branchCurveFromMain(curve, i, branchCount);
    const branchRadius = Math.max(0.13, mainRadius * (0.45 - i * 0.035));

    const joint = createJointBulge(data.root, branchRadius * 1.55);
    const branch = createTaperedMesh(
      data.curve,
      branchRadius,
      bumpPower * 0.78,
      28,
      105
    );

    hornGroup.add(joint);
    hornGroup.add(branch);
  }

  hornGroup.add(createBaseRing(curve.getPointAt(0), mainRadius));

  const box = new THREE.Box3().setFromObject(hornGroup);
  const center = new THREE.Vector3();
  box.getCenter(center);

  hornGroup.children.forEach((m) => {
    m.position.sub(center);
  });

  hornGroup.rotation.set(0, 0, -0.12);

  controls.target.set(0, 0, 0);
  controls.update();
}

function animate() {
  requestAnimationFrame(animate);
  if (controls) controls.update();
  if (renderer) renderer.render(scene, camera);
}

["size", "bend", "bump", "branch"].forEach((id) => {
  const el = document.getElementById("i-" + id);
  if (!el) return;

  el.oninput = (e) => {
    settings[id] = parseInt(e.target.value, 10);
    updateModel();
  };
});

document.getElementById("palette").onclick = (e) => {
  if (e.target.classList.contains("color-dot")) {
    const active = document.querySelector(".color-dot.active");
    if (active) active.classList.remove("active");

    e.target.classList.add("active");
    settings.color = e.target.dataset.color;
    updateModel();
  }
};

document.getElementById("custom-color").oninput = (e) => {
  const active = document.querySelector(".color-dot.active");
  if (active) active.classList.remove("active");

  settings.color = e.target.value;
  updateModel();
};

window.onresize = () => {
  const c = document.getElementById("viewer-container");
  if (!c || !camera || !renderer) return;

  camera.aspect = c.clientWidth / c.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(c.clientWidth, c.clientHeight);
};
</script>
</body>
</html>
